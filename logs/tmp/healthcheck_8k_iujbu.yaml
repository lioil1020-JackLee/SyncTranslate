audio:
  meeting_in: Windows WASAPI::CABLE Output (VB-Audio Virtual Cable)
  microphone_in: Windows WASAPI::耳機 (WH-1000XM5)
  speaker_out: Windows WASAPI::耳機 (WH-1000XM5)
  meeting_out: Windows WASAPI::CABLE Input (VB-Audio Virtual Cable)
  meeting_in_gain: 1.0
  microphone_in_gain: 1.0
  speaker_out_volume: 0.39
  meeting_out_volume: 1.0
direction:
  mode: bidirectional
language:
  meeting_source: en
  meeting_target: zh-TW
  local_source: zh-TW
  local_target: en
asr:
  engine: faster_whisper
  model: distil-large-v3
  device: cuda
  compute_type: float16
  beam_size: 1
  condition_on_previous_text: true
  vad:
    enabled: true
    min_speech_duration_ms: 160
    min_silence_duration_ms: 450
    max_speech_duration_s: 10.0
    speech_pad_ms: 300
    rms_threshold: 0.03
  streaming:
    partial_interval_ms: 250
    partial_history_seconds: 2
    final_history_seconds: 4
llm:
  backend: lm_studio
  base_url: http://127.0.0.1:1234
  model: qwen/qwen3.5-9b
  temperature: 0.1
  top_p: 0.8
  request_timeout_sec: 15
  sliding_window:
    enabled: true
    trigger_tokens: 18
    max_context_items: 6
  profiles:
    live_caption_fast:
      name: live_caption_fast
      prompt_style: literal
      context_items: 4
      partial_trigger_tokens: 18
      max_tokens: 256
      preserve_terms: true
      naturalize_tone: false
      allow_subject_completion: false
    live_caption_stable:
      name: live_caption_fast
      prompt_style: literal
      context_items: 4
      partial_trigger_tokens: 18
      max_tokens: 256
      preserve_terms: true
      naturalize_tone: false
      allow_subject_completion: false
    speech_output_natural:
      name: live_caption_fast
      prompt_style: literal
      context_items: 4
      partial_trigger_tokens: 18
      max_tokens: 256
      preserve_terms: true
      naturalize_tone: false
      allow_subject_completion: false
    technical_meeting:
      name: live_caption_fast
      prompt_style: literal
      context_items: 4
      partial_trigger_tokens: 18
      max_tokens: 256
      preserve_terms: true
      naturalize_tone: false
      allow_subject_completion: false
  caption_profile: live_caption_fast
  speech_profile: speech_output_natural
tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 1.0
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
meeting_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: en-US-JennyNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
local_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
tts_channels:
  local:
    engine: edge_tts
    executable_path: null
    model_path: null
    config_path: null
    voice_name: en-US-JennyNeural
    speaker_id: null
    length_scale: null
