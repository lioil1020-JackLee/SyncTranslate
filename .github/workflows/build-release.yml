name: Build and Release SyncTranslate

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.build_type }} (Windows)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [onedir, onefile]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        shell: pwsh
        run: |
          uv sync --locked --extra local --group dev

      - name: Verify runtime imports
        shell: pwsh
        run: |
          uv run python -c "import ssl; print('ssl ok')"
          uv run python -c "import edge_tts; print('edge_tts ok')"
          uv run python -c "import faster_whisper; print('faster_whisper ok')"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          uv run pyinstaller .\SyncTranslate-${{ matrix.build_type }}.spec --noconfirm --clean

      - name: Package onedir output
        if: matrix.build_type == 'onedir'
        shell: pwsh
        run: |
          Compress-Archive -Path .\dist\SyncTranslate-onedir\* -DestinationPath .\dist\SyncTranslate-onedir-windows.zip -Force

      - name: Upload artifacts
        if: matrix.build_type == 'onedir'
        uses: actions/upload-artifact@v4
        with:
          name: SyncTranslate-${{ matrix.build_type }}-windows
          path: |
            dist/SyncTranslate-onedir-windows.zip
          if-no-files-found: error

      - name: Upload artifacts
        if: matrix.build_type == 'onefile'
        uses: actions/upload-artifact@v4
        with:
          name: SyncTranslate-${{ matrix.build_type }}-windows
          path: |
            dist/SyncTranslate.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p final_assets
          find raw_artifacts -type f \( -name "SyncTranslate-onedir-windows.zip" -o -name "SyncTranslate.exe" \) -exec cp {} final_assets/ \;
          ls -lh final_assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: final_assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}