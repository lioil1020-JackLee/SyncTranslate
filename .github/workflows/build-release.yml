name: Build and Release SyncTranslate

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build onedir (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        shell: pwsh
        run: |
          uv sync --locked --extra local --group build

      - name: Verify runtime imports
        shell: pwsh
        run: |
          uv run python -c "import ssl; print('ssl ok')"
          uv run python -c "import torch, torchaudio; print(f'torch={torch.__version__}'); print(f'torchaudio={torchaudio.__version__}'); print(f'cuda_available={torch.cuda.is_available()}'); assert '+cu128' in torch.__version__, 'torch wheel is not cu128'; assert '+cu128' in torchaudio.__version__, 'torchaudio wheel is not cu128'"
          uv run python -c "import edge_tts; print('edge_tts ok')"
          uv run python -c "import faster_whisper; print('faster_whisper ok')"
          uv run python -c "import funasr; print('funasr ok')"
          uv run python -c "import tiktoken; print('tiktoken ok')"
          uv run python -c "import addict; print('addict ok')"
          uv run python -c "import onnxruntime; print('onnxruntime ok')"

      - name: Run test suite
        shell: pwsh
        run: |
          uv run pytest -q

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          uv run pyinstaller .\SyncTranslate-onedir.spec --noconfirm --clean

      - name: Package onedir output
        shell: pwsh
        run: |
          if (Test-Path .\release_staging) {
            Remove-Item .\release_staging -Recurse -Force
          }
          New-Item -ItemType Directory -Path .\release_staging | Out-Null
          Copy-Item .\dist\SyncTranslate-onedir .\release_staging\SyncTranslate-onedir -Recurse
          Compress-Archive -Path .\release_staging\SyncTranslate-onedir -DestinationPath .\dist\SyncTranslate-onedir-windows.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SyncTranslate-onedir-windows
          path: |
            dist/SyncTranslate-onedir-windows.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p final_assets
          find raw_artifacts -type f -name "SyncTranslate-onedir-windows.zip" -exec cp {} final_assets/ \;
          ls -lh final_assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: final_assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
