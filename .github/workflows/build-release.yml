name: Build and Release SyncTranslate

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build onedir (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        shell: pwsh
        run: |
          uv sync --locked --group build

      - name: Prepare external AI runtimes
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\tools\runtime_setup\prepare_external_runtimes.ps1

      - name: Verify external runtime imports
        shell: pwsh
        run: |
          uv run python -c "import ssl; print('ssl ok')"
          $sharedPy = "runtimes/shared/Scripts/python.exe"
          & $sharedPy -c "import torch, torchaudio; print('torch=' + torch.__version__); print('cuda=' + str(torch.cuda.is_available()))"
          $fwPy = "runtimes/faster_whisper/Scripts/python.exe"
          & $fwPy -c "import faster_whisper; print('faster_whisper ok')"
          $funasrPy = "runtimes/funasr/Scripts/python.exe"
          & $funasrPy -c "import funasr; print('funasr ok')"

      - name: Run test suite
        shell: pwsh
        run: |
          uv run pytest -q

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          uv run pyinstaller .\SyncTranslate-onedir.spec --noconfirm --clean

      - name: Relocate AI runtimes to dist root
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\tools\runtime_setup\relocate_ai_runtime_artifacts.ps1 -DistRoot .\dist\SyncTranslate-onedir

      - name: Package onedir output
        shell: pwsh
        run: |
          if (Test-Path .\release_staging) {
            Remove-Item .\release_staging -Recurse -Force
          }
          New-Item -ItemType Directory -Path .\release_staging | Out-Null
          Copy-Item .\dist\SyncTranslate-onedir .\release_staging\SyncTranslate-onedir -Recurse
          Compress-Archive -Path .\release_staging\SyncTranslate-onedir -DestinationPath .\dist\SyncTranslate-onedir-windows.zip -Force

      - name: Split oversized release asset
        shell: pwsh
        run: |
          $zipPath = ".\dist\SyncTranslate-onedir-windows.zip"
          $chunkSize = 1900MB

          if (!(Test-Path $zipPath)) {
            throw "Missing archive: $zipPath"
          }

          $zipFile = Get-Item $zipPath
          Write-Host "Archive size bytes: $($zipFile.Length)"

          # Keep single zip if under GitHub release asset limit.
          if ($zipFile.Length -le $chunkSize) {
            Write-Host "Archive is under chunk threshold; split not required."
            return
          }

          Write-Host "Archive exceeds threshold; splitting into chunks of $chunkSize bytes."
          $bufferSize = 4MB
          $buffer = New-Object byte[] $bufferSize
          $index = 1

          $input = [System.IO.File]::OpenRead($zipPath)
          try {
            while ($input.Position -lt $input.Length) {
              $partPath = "$zipPath.part{0:d3}" -f $index
              $output = [System.IO.File]::Create($partPath)
              try {
                $remaining = [int64]$chunkSize
                while ($remaining -gt 0 -and $input.Position -lt $input.Length) {
                  $toRead = [Math]::Min($bufferSize, [int]$remaining)
                  $read = $input.Read($buffer, 0, $toRead)
                  if ($read -le 0) {
                    break
                  }
                  $output.Write($buffer, 0, $read)
                  $remaining -= $read
                }
              }
              finally {
                $output.Dispose()
              }
              Write-Host "Created chunk: $partPath"
              $index += 1
            }
          }
          finally {
            $input.Dispose()
          }

          # Remove oversized source archive so release upload uses only legal-size parts.
          Remove-Item $zipPath -Force
          @'
          # Rebuild archive from parts (PowerShell)
          $parts = Get-ChildItem .\SyncTranslate-onedir-windows.zip.part* | Sort-Object Name
          $out = [System.IO.File]::Create("SyncTranslate-onedir-windows.zip")
          try {
            foreach ($p in $parts) {
              $in = [System.IO.File]::OpenRead($p.FullName)
              try {
                $in.CopyTo($out)
              }
              finally {
                $in.Dispose()
              }
            }
          }
          finally {
            $out.Dispose()
          }
          '@ | Set-Content .\dist\rebuild-zip-from-parts.ps1 -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SyncTranslate-onedir-windows
          path: |
            dist/SyncTranslate-onedir-windows.zip*
            dist/SyncTranslate-onedir-windows.zip.part*
            dist/rebuild-zip-from-parts.ps1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw_artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p final_assets
          find raw_artifacts -type f -name "SyncTranslate-onedir-windows.zip" -exec cp {} final_assets/ \;
          find raw_artifacts -type f -name "SyncTranslate-onedir-windows.zip.part*" -exec cp {} final_assets/ \;
          find raw_artifacts -type f -name "rebuild-zip-from-parts.ps1" -exec cp {} final_assets/ \;
          ls -lh final_assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: final_assets/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
