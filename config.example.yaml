audio:
  meeting_in: Windows WASAPI::CABLE Output (VB-Audio Virtual Cable)
  microphone_in: Windows WASAPI::Voicemeeter Out B1 (VB-Audio Voicemeeter VAIO)
  speaker_out: Windows WASAPI::Voicemeeter Input (VB-Audio Voicemeeter VAIO)
  meeting_out: Windows WASAPI::CABLE Input (VB-Audio Virtual Cable)
  meeting_in_gain: 1.0
  microphone_in_gain: 1.0
  speaker_out_volume: 1.0
  meeting_out_volume: 1.0
direction:
  mode: bidirectional
language:
  meeting_source: zh-TW
  meeting_target: en
  local_source: en
  local_target: zh-TW
asr:
  engine: faster_whisper
  model: small
  device: cuda
  compute_type: float16
  beam_size: 1
  condition_on_previous_text: false
  vad:
    enabled: true
    min_speech_duration_ms: 160
    min_silence_duration_ms: 450
    max_speech_duration_s: 10.0
    speech_pad_ms: 300
    rms_threshold: 0.03
  streaming:
    partial_interval_ms: 250
    partial_history_seconds: 2
    final_history_seconds: 4
llm:
  backend: lm_studio
  base_url: http://127.0.0.1:1234
  model: qwen/qwen3.5-9b
  temperature: 0.1
  top_p: 0.75
  request_timeout_sec: 15
  sliding_window:
    enabled: true
    trigger_tokens: 18
    max_context_items: 6
tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 1.0
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
meeting_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: en-US-JennyNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
local_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.6
  sample_rate: 24000
tts_channels:
  local:
    engine: edge_tts
    executable_path: null
    model_path: null
    config_path: null
    voice_name: en-US-JennyNeural
    speaker_id: null
    length_scale: null
    noise_scale: null
    noise_w: 0.6
    sample_rate: 24000
  remote:
    engine: edge_tts
    executable_path: null
    model_path: null
    config_path: null
    voice_name: zh-TW-HsiaoChenNeural
    speaker_id: null
    length_scale: null
    noise_scale: null
    noise_w: 0.6
    sample_rate: 24000
runtime:
  sample_rate: 24000
  chunk_ms: 40
  asr_queue_maxsize: 24
  llm_queue_maxsize: 8
  tts_queue_maxsize: 8
  warmup_on_start: true
health_last_success:
  asr: ''
  llm: ''
  tts: ''
