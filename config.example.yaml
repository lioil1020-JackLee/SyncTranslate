    repeat_penalty: 1.08
    stop_tokens: '</target>,Translation:'
    request_timeout_sec: 12
    sliding_window:
      enabled: true
      trigger_tokens: 20
      max_context_items: 5
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
        name: dialogue_fast
        prompt_style: literal
        context_items: 2
        partial_trigger_tokens: 10
        max_tokens: 128
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      live_caption_stable:
        name: live_caption_stable
        prompt_style: stable
        context_items: 8
        partial_trigger_tokens: 20
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      speech_output_natural:
