audio:
  meeting_in: Windows WASAPI::CABLE Output (VB-Audio Virtual Cable)
  microphone_in: Windows DirectSound::Voicemeeter Out B1 (VB-Audio Voicemeeter VAIO)
  speaker_out: Windows DirectSound::Voicemeeter Input (VB-Audio Voicemeeter VAIO)
  meeting_out: Windows WASAPI::CABLE Input (VB-Audio Virtual Cable)
  meeting_in_gain: 1.0
  microphone_in_gain: 1.0
  speaker_out_volume: 1.0
  meeting_out_volume: 1.0
direction:
  mode: bidirectional
language:
  meeting_source: zh-TW
  meeting_target: en
  local_source: en
  local_target: zh-TW
asr:
  engine: faster_whisper
  model: large-v3
  device: cuda
  compute_type: float16
  beam_size: 1
  condition_on_previous_text: true
  vad:
    enabled: true
    min_speech_duration_ms: 120
    min_silence_duration_ms: 450
    max_speech_duration_s: 12.0
    speech_pad_ms: 250
    rms_threshold: 0.015
  streaming:
    partial_interval_ms: 300
    partial_history_seconds: 2
    final_history_seconds: 5
llm:
  backend: lm_studio
  base_url: http://127.0.0.1:1234
  model: qwen/qwen3.5-9b
  temperature: 0.1
  top_p: 0.75
  request_timeout_sec: 20
  sliding_window:
    enabled: true
    trigger_tokens: 20
    max_context_items: 8
tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.65
  sample_rate: 48000
meeting_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.65
  sample_rate: 48000
local_tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: en-GB-RyanNeural
  speaker_id: 0
  length_scale: 0.9
  noise_scale: 0.667
  noise_w: 0.5
  sample_rate: 48000
tts_channels:
  local:
    engine: edge_tts
    executable_path: null
    model_path: null
    config_path: null
    voice_name: zh-TW-HsiaoChenNeural
    speaker_id: null
    length_scale: null
    noise_scale: null
    noise_w: 0.65
    sample_rate: 48000
  remote:
    engine: edge_tts
    executable_path: null
    model_path: null
