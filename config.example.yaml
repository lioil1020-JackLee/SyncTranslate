asr_channels:
  local:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 1
    final_beam_size: 4
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: ''
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: 0.0
    no_speech_threshold: 0.25
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 200
      min_silence_duration_ms: 520
      max_speech_duration_s: 24.0
      speech_pad_ms: 320
      rms_threshold: 0.022
      neural_threshold: 0.45
    streaming:
      partial_interval_ms: 460
      partial_history_seconds: 2
      final_history_seconds: 20
      soft_final_audio_ms: 3600
  remote:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 1
    final_beam_size: 5
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: ''
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: 0.0
    no_speech_threshold: 0.32
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 180
      min_silence_duration_ms: 460
      max_speech_duration_s: 24.0
      speech_pad_ms: 260
