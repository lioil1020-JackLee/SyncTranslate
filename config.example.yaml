      neural_threshold: 0.35
    streaming:
      partial_interval_ms: 420
      partial_history_seconds: 2
      final_history_seconds: 12
      soft_final_audio_ms: 2600
llm_channels:
  local:
    backend: lm_studio
    base_url: http://127.0.0.1:1234
    model: hy-mt1.5-7b
    temperature: 0.0
    top_p: 0.8
    max_output_tokens: 112
    repeat_penalty: 1.08
    stop_tokens: '</target>,Translation:'
    request_timeout_sec: 9
    sliding_window:
      enabled: true
      trigger_tokens: 20
      max_context_items: 5
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
        name: dialogue_fast
