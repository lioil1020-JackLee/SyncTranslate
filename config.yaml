tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  style_preset: fast_response
  speaker_id: 0
  length_scale: 1.02
  noise_scale: 0.6
  noise_w: 0.65
  sample_rate: 24000
tts_channels:
  local: {}
  remote:
    voice_name: ko-KR-SunHiNeural
runtime:
  asr_pipeline: v2
  asr_v2_backend: faster_whisper_v2
  asr_v2_endpointing: neural_endpoint
  sample_rate: 48000
  chunk_ms: 40
  adaptive_asr_enabled: true
  adaptive_llm_enabled: true
  asr_pre_roll_ms: 180
  latency_mode: low_latency
  display_partial_strategy: stable_only
  stable_partial_min_repeats: 1
  partial_stability_max_delta_chars: 8
  asr_partial_min_audio_ms: 220
  asr_partial_interval_floor_ms: 200
  llm_partial_interval_floor_ms: 180
  early_final_enabled: true
  tts_accept_stable_partial: false
  tts_partial_min_chars: 8
  tts_use_speech_profile: false
  asr_queue_maxsize_local: 96
  asr_queue_maxsize_remote: 96
  llm_queue_maxsize_local: 16
  llm_queue_maxsize_remote: 16
  tts_queue_maxsize_local: 12
  tts_queue_maxsize_remote: 12
  translation_exact_cache_size: 256
  translation_prefix_min_delta_chars: 6
  tts_cancel_pending_on_new_final: true
  tts_cancel_policy: older_only
  tts_max_wait_ms: 1200
  tts_max_chars: 96
  tts_drop_backlog_threshold: 2
  llm_streaming_tokens: 12
  max_pipeline_latency_ms: 2200
  asr_frontend_enabled: true
  asr_frontend_target_rms: 0.05
  asr_frontend_max_gain: 3.0
  asr_frontend_highpass_alpha: 0.96
  asr_enhancement_enabled: true
  asr_enhancement_noise_reduce_strength: 0.42
  asr_enhancement_noise_adapt_rate: 0.18
  asr_enhancement_music_suppress_strength: 0.2
  asr_hotwords_enabled: false
  asr_hotword_lexicon: ''
  asr_result_validator_enabled: true
  asr_result_max_chars_per_second: 14.0
  asr_result_min_speech_ratio_for_long_text: 0.18
  asr_final_correction_enabled: true
  asr_final_correction_context_items: 3
  asr_final_correction_max_chars: 120
  speaker_diarization_enabled: false
  speaker_diarization_min_audio_ms: 1200
  speaker_diarization_max_speakers: 2
  speaker_diarization_similarity_threshold: 0.88
  local_echo_guard_enabled: false
  local_echo_guard_resume_delay_ms: 300
  remote_echo_guard_resume_delay_ms: 300
  tts_output_mode: passthrough
  remote_asr_language: zh-TW
  local_asr_language: zh-TW
  remote_translation_target: en
  local_translation_target: en
  remote_tts_voice: none
  local_tts_voice: none
  remote_tts_enabled: false
  local_tts_enabled: false
  glossary_enabled: false
  glossary_path: ''
  glossary_apply_on_partial: false
  glossary_apply_on_final: true
  enable_postprocessor: true
  enable_partial_stabilization: true
  enable_structured_logging: true
  runtime_log_format: jsonl
  asr_profile_local: turn_taking
  asr_profile_remote: turn_taking
  degradation_policy_enabled: true
