audio:
  meeting_in: 喇叭 (SyncTranslate Virtual Audio Device)
  microphone_in: Microsoft 音效對應表 - Input
  speaker_out: Microsoft 音效對應表 - Output
  meeting_out: SyncTranslate Virtual Microphone (SyncTranslate Virtual Audio Device)
  routing_mode: synctranslate_virtual_audio
  system_devices:
    capture_role: communications
    render_role: communications
    follow_system_default: true
    fallback_to_multimedia_role: true
    exclude_virtual_devices: true
  virtual_audio:
    speaker_name: SyncTranslate Virtual Speaker
    microphone_name: SyncTranslate Virtual Microphone
    bridge_enabled: true
    bridge_path: runtimes\audio\sync_audio_bridge.exe
    sample_rate: 48000
    frame_ms: 10
    target_latency_ms: 120
    require_driver: true
  call_translation:
    listen_remote_original: true
    listen_remote_translation: true
    output_local_original: false
    output_local_translation: true
language:
  meeting_source: en
  meeting_target: en
  local_source: zh-TW
  local_target: en
llm_channels:
  local:
    backend: local_llama_inprocess
    model: hy-mt1.5-7b
    runtime:
      model_path: .\runtimes\models\llm\hy-mt1.5-7b.gguf
      ctx_size: 4096
      gpu_layers: 35
      threads: 8
      batch_size: 512
    temperature: 0.0
    top_p: 0.78
    max_output_tokens: 96
    repeat_penalty: 1.1
    stop_tokens: '</target>,Translation:'
    request_timeout_sec: 9
    sliding_window:
      enabled: true
      trigger_tokens: 18
      max_context_items: 4
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
        name: dialogue_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 18
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      live_caption_stable:
        name: live_caption_stable
        prompt_style: stable
        context_items: 8
        partial_trigger_tokens: 20
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      speech_output_natural:
        name: speech_output_natural
        prompt_style: natural
        context_items: 6
        partial_trigger_tokens: 24
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: true
        allow_subject_completion: true
      technical_meeting:
        name: technical_meeting
        prompt_style: technical
        context_items: 8
        partial_trigger_tokens: 22
        max_tokens: 320
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
    caption_profile: live_caption_fast
    speech_profile: speech_output_natural
  remote:
    backend: local_llama_inprocess
    model: hy-mt1.5-7b
    runtime:
      model_path: .\runtimes\models\llm\hy-mt1.5-7b.gguf
      ctx_size: 4096
      gpu_layers: 35
      threads: 8
      batch_size: 512
    temperature: 0.0
    top_p: 0.78
    max_output_tokens: 128
    repeat_penalty: 1.1
    stop_tokens: '</target>,Translation:'
    request_timeout_sec: 12
    sliding_window:
      enabled: true
      trigger_tokens: 18
      max_context_items: 4
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
        name: dialogue_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 18
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      live_caption_stable:
        name: live_caption_stable
        prompt_style: stable
        context_items: 8
        partial_trigger_tokens: 20
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      speech_output_natural:
        name: speech_output_natural
        prompt_style: natural
        context_items: 6
        partial_trigger_tokens: 24
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: true
        allow_subject_completion: true
      technical_meeting:
        name: technical_meeting
        prompt_style: technical
        context_items: 8
        partial_trigger_tokens: 22
        max_tokens: 320
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
    caption_profile: live_caption_fast
    speech_profile: speech_output_natural
tts:
  engine: edge_tts
  executable_path: ''
  model_path: ''
  config_path: ''
  voice_name: zh-TW-HsiaoChenNeural
  style_preset: broadcast_clear
  speaker_id: 0
  length_scale: 1.0
  noise_scale: 0.6
  noise_w: 0.65
  sample_rate: 24000
tts_channels:
  local: {}
  remote:
    voice_name: ko-KR-SunHiNeural
runtime:
  asr_pipeline: v2
  asr_v2_backend: faster_whisper_v2
  asr_v2_endpointing: neural_endpoint
  sample_rate: 48000
  chunk_ms: 40
  adaptive_asr_enabled: true
  adaptive_llm_enabled: true
  asr_pre_roll_ms: 360
  latency_mode: balanced
  display_partial_strategy: stable_only
  stable_partial_min_repeats: 3
  partial_stability_max_delta_chars: 6
  asr_partial_min_audio_ms: 360
  asr_partial_interval_floor_ms: 280
  llm_partial_interval_floor_ms: 280
  early_final_enabled: false
  tts_accept_stable_partial: false
  tts_partial_min_chars: 12
  tts_use_speech_profile: false
  asr_queue_maxsize_local: 256
  asr_queue_maxsize_remote: 256
  llm_queue_maxsize_local: 24
  llm_queue_maxsize_remote: 24
  tts_queue_maxsize_local: 16
  tts_queue_maxsize_remote: 16
  translation_exact_cache_size: 256
  translation_prefix_min_delta_chars: 6
  tts_cancel_pending_on_new_final: true
  tts_cancel_policy: older_only
  tts_max_wait_ms: 2200
  tts_max_chars: 160
  tts_drop_backlog_threshold: 3
  llm_streaming_tokens: 16
  max_pipeline_latency_ms: 3200
  asr_frontend_enabled: true
  asr_frontend_target_rms: 0.06
  asr_frontend_max_gain: 3.5
  asr_frontend_highpass_alpha: 0.96
  asr_enhancement_enabled: true
  asr_enhancement_noise_reduce_strength: 0.28
  asr_enhancement_noise_adapt_rate: 0.18
  asr_enhancement_music_suppress_strength: 0.12
  asr_hotwords_enabled: false
  asr_hotword_lexicon: ''
  asr_result_validator_enabled: true
  asr_result_max_chars_per_second: 16.0
  asr_result_min_speech_ratio_for_long_text: 0.14
  asr_final_correction_enabled: false
  asr_final_correction_context_items: 3
  asr_final_correction_max_chars: 120
  speaker_diarization_enabled: false
  speaker_diarization_min_audio_ms: 1200
  speaker_diarization_max_speakers: 2
  speaker_diarization_similarity_threshold: 0.88
  local_echo_guard_enabled: false
  local_echo_guard_resume_delay_ms: 300
  remote_echo_guard_resume_delay_ms: 300
  tts_output_mode: passthrough
  remote_asr_language: auto
  local_asr_language: zh-TW
  remote_translation_target: en
  local_translation_target: en
  remote_tts_voice: none
  local_tts_voice: none
  remote_tts_enabled: false
  local_tts_enabled: false
  glossary_enabled: false
  glossary_path: ''
  glossary_apply_on_partial: false
  glossary_apply_on_final: true
  enable_postprocessor: true
  enable_partial_stabilization: true
  enable_structured_logging: true
  runtime_log_format: jsonl
  asr_profile_local: meeting_room
  asr_profile_remote: meeting_room
  degradation_policy_enabled: true
  asr_final_priority_enabled: true
  asr_final_priority_queue_ratio: 0.45
  asr_final_priority_latency_ms: 1800
  asr_final_priority_recover_queue_ratio: 0.15
  asr_final_priority_recover_after_ms: 8000
  asr_display_punctuation_enabled: false
  asr_display_punctuation_languages: zh
  asr_display_punctuation_mode: lightweight
  asr_accuracy_mode: balanced
  asr_final_rescue_enabled: true
  asr_final_rescue_max_attempts: 1
  asr_final_rescue_min_avg_logprob: -1.0
  asr_final_rescue_max_no_speech_prob: 0.65
  asr_final_rescue_max_compression_ratio: 2.4
  asr_final_rescue_min_chars: 4
  asr_chinese_fallback_enabled: true
  asr_chinese_fallback_model: .\runtimes\models\belle-zh-ct2
asr_profiles:
  chinese:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 2
    final_beam_size: 4
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: 以下是繁體中文口語敘事逐字稿。
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: '0.0'
    no_speech_threshold: 0.4
    hallucination_filter: true
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 220
      min_silence_duration_ms: 600
      max_speech_duration_s: 16.0
      speech_pad_ms: 360
      rms_threshold: 0.022
      neural_threshold: 0.45
      startup_suppress_ms: 400
    streaming:
      partial_interval_ms: 520
      partial_history_seconds: 2
      final_history_seconds: 20
      soft_final_audio_ms: 4000
  non_chinese:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 1
    final_beam_size: 5
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: ''
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: '0.0'
    no_speech_threshold: 0.32
    hallucination_filter: true
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 200
      min_silence_duration_ms: 520
      max_speech_duration_s: 16.0
      speech_pad_ms: 320
      rms_threshold: 0.02
      neural_threshold: 0.35
      startup_suppress_ms: 0
    streaming:
      partial_interval_ms: 480
      partial_history_seconds: 2
      final_history_seconds: 14
      soft_final_audio_ms: 3400
