audio:
  meeting_in: Windows WASAPI::Voicemeeter Out B1 (VB-Audio Voicemeeter VAIO)
  microphone_in: Windows WASAPI::Voicemeeter Out B2 (VB-Audio Voicemeeter VAIO)
  speaker_out: Windows WASAPI::Voicemeeter In 1 (VB-Audio Voicemeeter VAIO)
  meeting_out: Windows WASAPI::Voicemeeter AUX Input (VB-Audio Voicemeeter VAIO)
  meeting_in_gain: 1.0
  microphone_in_gain: 1.0
  speaker_out_volume: 0.2
  meeting_out_volume: 1.0
language:
  meeting_source: en
  meeting_target: en
  local_source: zh-TW
  local_target: en
asr_channels:
  local:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 1
    final_beam_size: 4
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: 以下是繁體中文口語敘事逐字稿。
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: '0.0'
    no_speech_threshold: 0.32
    hallucination_filter: true
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 140
      min_silence_duration_ms: 280
      max_speech_duration_s: 12.0
      speech_pad_ms: 220
      rms_threshold: 0.021
      neural_threshold: 0.4
      startup_suppress_ms: 200
    streaming:
      partial_interval_ms: 240
      partial_history_seconds: 1
      final_history_seconds: 8
      soft_final_audio_ms: 1800
  remote:
    engine: faster_whisper
    model: large-v3-turbo
    device: cuda
    compute_type: float16
    beam_size: 1
    final_beam_size: 5
    condition_on_previous_text: false
    final_condition_on_previous_text: false
    initial_prompt: ''
    hotwords: ''
    speculative_draft_model: ''
    speculative_num_beams: 1
    temperature_fallback: '0.0'
    no_speech_threshold: 0.28
    hallucination_filter: true
    vad:
      enabled: true
      backend: silero_vad
      min_speech_duration_ms: 140
      min_silence_duration_ms: 260
      max_speech_duration_s: 12.0
      speech_pad_ms: 200
      rms_threshold: 0.019
      neural_threshold: 0.34
      startup_suppress_ms: 0
    streaming:
      partial_interval_ms: 220
      partial_history_seconds: 1
      final_history_seconds: 8
      soft_final_audio_ms: 1600
llm_channels:
  local:
    backend: lm_studio
    base_url: http://127.0.0.1:1234
    model: hy-mt1.5-7b
    temperature: 0.0
    top_p: 0.7
    max_output_tokens: 80
    repeat_penalty: 1.06
    stop_tokens: '</target>,Translation:'
    request_timeout_sec: 9
    sliding_window:
      enabled: true
      trigger_tokens: 10
      max_context_items: 3
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
