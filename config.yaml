    request_timeout_sec: 12
    sliding_window:
      enabled: true
      trigger_tokens: 10
      max_context_items: 3
    profiles:
      live_caption_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 16
        max_tokens: 192
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
      dialogue_fast:
        name: live_caption_fast
        prompt_style: literal
        context_items: 4
        partial_trigger_tokens: 18
        max_tokens: 256
        preserve_terms: true
        naturalize_tone: false
        allow_subject_completion: false
