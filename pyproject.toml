[project]
name = "synctranslate"
version = "0.1.0"
description = "Desktop interpreter assistant for video meetings"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.3.3",
    "pyside6>=6.9.3",
    "pyyaml>=6.0.3",
    "sounddevice>=0.5.2",
]

[project.optional-dependencies]
free = [
    "edge-tts>=7.2.3",
    "miniaudio>=1.61",
]
local = [
    "faster-whisper>=1.1.1",
]
